# =============================================================================
# CD Pipeline - Study Link Deployment
# =============================================================================
# Triggers:
#   - Push to main branch (usually via PR merge)
#
# Jobs:
#   1. ci-checks      - Runs all CI checks before deploying
#   2. build-and-push - Builds the Docker image and pushes to ACR
#   3. deploy         - Runs the Ansible playbook to update the App VM

# =============================================================================

name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: CI CHECKS
  # Runs all CI checks before deploying
  # ---------------------------------------------------------------------------
  ci-checks:
    name: Run CI Checks
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # JOB 2: BUILD AND PUSH
  # Builds the image and pushes it to Azure Container Registry (ACR).
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: ci-checks  
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/study-link:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # JOB 3: DEPLOY
  # Runs the Ansible playbook to pull the new image and restart the container.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to App VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH config for Bastion tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/private_key.pem
          chmod 600 ~/.ssh/private_key.pem
          cat > ~/.ssh/config << EOF
          Host bastion
            HostName ${{ secrets.BASTION_IP }}
            User rwaka
            IdentityFile ~/.ssh/private_key.pem
            StrictHostKeyChecking no
          Host appvm
            HostName ${{ secrets.VM_IP }}
            User rwaka
            IdentityFile ~/.ssh/private_key.pem
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

      - name: Test SSH to Bastion
        run: |
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/private_key.pem
          chmod 600 ~/.ssh/private_key.pem
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/private_key.pem \
            rwaka@${{ secrets.BASTION_IP }} "echo BASTION_CONNECTED"

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/private_key.pem
          chmod 600 ~/.ssh/private_key.pem
          echo "[app]" > inventory_cd.ini
          echo "app-vm ansible_host=${{ secrets.VM_IP }} ansible_user=rwaka ansible_ssh_private_key_file=~/.ssh/private_key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -J rwaka@${{ secrets.BASTION_IP }}'" >> inventory_cd.ini
          ansible-playbook -i inventory_cd.ini ansible/playbook.yml \
            --extra-vars "acr_login_server=${{ secrets.ACR_LOGIN_SERVER }} \
                          acr_username=${{ secrets.ACR_USERNAME }} \
                          acr_password=${{ secrets.ACR_PASSWORD }} \
                          db_name=${{ secrets.DB_NAME }} \
                          db_user=${{ secrets.DB_USER }} \
                          db_password=${{ secrets.DB_PASSWORD }} \
                          db_host=${{ secrets.DB_HOST }}"
